# yappix.net — статический фронт (Vite), без редиректа на yappix.ru
# Бэкап предыдущей версии: sites-available/yappix.net.bak.*

server {
    listen 80;
    listen [::]:80;
    server_name yappix.net www.yappix.net;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://yappix.net$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.yappix.net;

    ssl_certificate     /etc/letsencrypt/live/yappix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yappix.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://yappix.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yappix.net;

    ssl_certificate     /etc/letsencrypt/live/yappix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yappix.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/yappix.net;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpe?g|gif|ico|svg|webp|woff2?|webmanifest|json)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
